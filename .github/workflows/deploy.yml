name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: subfrost-io
  REPOSITORY: subfrost-docker

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    # Surface PREFETCH_SECRET as an env var so step-level `if:` can read it.
    # The `secrets` context is NOT available in `if:` conditions, which silently
    # invalidates the whole workflow file; `env` is allowed.
    env:
      PREFETCH_SECRET: ${{ secrets.PREFETCH_SECRET }}

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Workload Identity Federation (Recommended)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"

          docker build \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            --cache-from "${IMAGE}:latest" \
            .

          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Get Cloud SQL connection name
        id: sql
        run: |
          CONNECTION=$(gcloud sql instances describe subfrost-postgres --format='value(connectionName)' 2>/dev/null || echo "")
          echo "connection=${CONNECTION}" >> $GITHUB_OUTPUT

      - name: Get Redis IP
        id: redis
        run: |
          REDIS_IP=$(gcloud redis instances describe subfrost-redis --region=${{ env.REGION }} --format='value(host)' 2>/dev/null || echo "")
          echo "ip=${REDIS_IP}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE}" \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 3000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 80 \
            --timeout 120 \
            --vpc-connector subfrost-connector \
            --add-cloudsql-instances "${{ steps.sql.outputs.connection }}" \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "NEXT_PUBLIC_NETWORK=mainnet" \
            --set-env-vars "REDIS_URL=redis://${{ steps.redis.outputs.ip }}:6379" \
            --set-env-vars "ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}" \
            --set-env-vars "PREFETCH_SECRET=${{ secrets.PREFETCH_SECRET }}" \
            --set-env-vars "CMS_BUCKET=subfrost-cms" \
            --set-secrets "DATABASE_URL=db-connection-string:latest,AUTH_SECRET=cms-auth-secret:latest"

      - name: Get Service URL
        id: service
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "### Deployment Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Setup Prefetch Scheduler
        if: ${{ env.PREFETCH_SECRET != '' }}
        # Non-fatal: the deploy SA currently lacks serviceusage permission to
        # enable cloudscheduler.googleapis.com. The scheduler only warms a cache,
        # so a failure here must not fail the deploy or skip downstream jobs.
        continue-on-error: true
        run: |
          gcloud services enable cloudscheduler.googleapis.com --quiet

          # Delete existing job if present so we can re-create cleanly
          if gcloud scheduler jobs describe subfrost-prefetch --location=${{ env.REGION }} > /dev/null 2>&1; then
            gcloud scheduler jobs delete subfrost-prefetch --location=${{ env.REGION }} --quiet
          fi

          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')

          gcloud scheduler jobs create http subfrost-prefetch \
            --location=${{ env.REGION }} \
            --schedule="0,25,50 * * * *" \
            --uri="${SERVICE_URL}/api/prefetch" \
            --http-method=GET \
            --headers="Authorization=Bearer ${{ secrets.PREFETCH_SECRET }}" \
            --time-zone="UTC" \
            --attempt-deadline="540s" \
            --description="Warms Redis cache for landing page metrics every 25 minutes"

          echo "Prefetch scheduler job created/updated"

      - name: Setup Daily Snapshot Scheduler
        if: ${{ env.PREFETCH_SECRET != '' }}
        # Non-fatal for the same reason as the prefetch scheduler (see above).
        continue-on-error: true
        run: |
          gcloud services enable cloudscheduler.googleapis.com --quiet

          if gcloud scheduler jobs describe subfrost-daily-snapshot --location=${{ env.REGION }} > /dev/null 2>&1; then
            gcloud scheduler jobs delete subfrost-daily-snapshot --location=${{ env.REGION }} --quiet
          fi

          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')

          gcloud scheduler jobs create http subfrost-daily-snapshot \
            --location=${{ env.REGION }} \
            --schedule="5 0 * * *" \
            --uri="${SERVICE_URL}/api/marketing/snapshot-cron" \
            --http-method=GET \
            --headers="Authorization=Bearer ${{ secrets.PREFETCH_SECRET }}" \
            --time-zone="UTC" \
            --attempt-deadline="540s" \
            --description="Captures one protocol snapshot per day at 00:05 UTC"

          echo "Daily snapshot scheduler job created/updated"

      - name: Update Cloudflare DNS
        if: ${{ vars.CLOUDFLARE_DOMAIN != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DOMAIN="${{ vars.CLOUDFLARE_DOMAIN }}"
          TARGET="216.239.32.21"

          # Get Zone ID
          if [ -n "${{ vars.CLOUDFLARE_ZONE_ID }}" ]; then
            CF_ZONE_ID="${{ vars.CLOUDFLARE_ZONE_ID }}"
          else
            ROOT_DOMAIN=$(echo "$DOMAIN" | awk -F. '{print $(NF-1)"."$NF}')
            CF_ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=${ROOT_DOMAIN}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" | jq -r '.result[0].id')

            if [ "$CF_ZONE_ID" = "null" ] || [ -z "$CF_ZONE_ID" ]; then
              echo "Error: Could not find zone for ${ROOT_DOMAIN}"
              exit 1
            fi
          fi

          # Check for existing record
          RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?name=${DOMAIN}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          RECORD_ID=$(echo "$RESPONSE" | jq -r '.result[] | select(.type == "A" or .type == "CNAME") | .id' | head -1)

          if [ -n "$RECORD_ID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"${DOMAIN}\",\"content\":\"${TARGET}\",\"ttl\":1,\"proxied\":false}" > /dev/null
            echo "Updated A record: ${DOMAIN} -> ${TARGET}"
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"${DOMAIN}\",\"content\":\"${TARGET}\",\"ttl\":1,\"proxied\":false}" > /dev/null
            echo "Created A record: ${DOMAIN} -> ${TARGET}"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Custom Domain:** https://${DOMAIN}" >> $GITHUB_STEP_SUMMARY

  deploy-media-server:
    name: Deploy Media Server
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ github.event.inputs.environment || 'production' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Media Server image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/subfrost-media-server"

          docker build \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            ./media-server

          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy Media Server to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/subfrost-media-server:${{ github.sha }}"

          gcloud run deploy subfrost-media-server \
            --image "${IMAGE}" \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 2 \
            --memory 2Gi \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 5 \
            --timeout 3600 \
            --session-affinity \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "GCS_BUCKET=subfrost-live-streams" \
            --set-env-vars "MAIN_APP_URL=https://${{ vars.CLOUDFLARE_DOMAIN }}" \
            --set-env-vars "STREAM_SECRET=${{ secrets.STREAM_SECRET }}"

      - name: Get Media Server URL
        id: media-service
        run: |
          URL=$(gcloud run services describe subfrost-media-server \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Update media.subfrost.io DNS
        if: ${{ vars.CLOUDFLARE_ZONE_ID != '' }}
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DOMAIN="media.subfrost.io"
          # Static IP of the GCP Application Load Balancer (serverless NEG -> Cloud Run)
          # GCP LB handles SSL with a Google-managed cert, so Cloudflare proxy is off.
          MEDIA_IP="34.128.174.75"
          CF_ZONE_ID="${{ vars.CLOUDFLARE_ZONE_ID }}"

          RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?name=${DOMAIN}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          RECORD_ID=$(echo "$RESPONSE" | jq -r '.result[] | select(.type == "A" or .type == "CNAME") | .id' | head -1)

          if [ -n "$RECORD_ID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"${DOMAIN}\",\"content\":\"${MEDIA_IP}\",\"ttl\":1,\"proxied\":false}" > /dev/null
            echo "Updated A record: ${DOMAIN} -> ${MEDIA_IP}"
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"${DOMAIN}\",\"content\":\"${MEDIA_IP}\",\"ttl\":1,\"proxied\":false}" > /dev/null
            echo "Created A record: ${DOMAIN} -> ${MEDIA_IP}"
          fi

  migrate:
    name: Sync Database Schema
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ github.event.inputs.environment || 'production' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup schema sync job
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          SQL_CONNECTION=$(gcloud sql instances describe subfrost-postgres --format='value(connectionName)' 2>/dev/null || echo "")

          if [ -z "$SQL_CONNECTION" ]; then
            echo "Error: Cloud SQL instance not found"
            exit 1
          fi

          # Check if job exists
          if gcloud run jobs describe prisma-migrate --region=${{ env.REGION }} > /dev/null 2>&1; then
            echo "Updating existing migration job..."
            ACTION="update"
          else
            echo "Creating new migration job..."
            ACTION="create"
          fi

          # Create or update the job with correct configuration
          # Using 'db push' instead of 'migrate deploy' because:
          # - It's idempotent (safe to run multiple times)
          # - Doesn't require migration files
          # - Creates/updates tables to match schema
          gcloud run jobs $ACTION prisma-migrate \
            --region=${{ env.REGION }} \
            --image="${IMAGE}" \
            --max-retries=0 \
            --task-timeout=10m \
            --cpu=1 \
            --memory=512Mi \
            --vpc-connector=subfrost-connector \
            --add-cloudsql-instances="${SQL_CONNECTION}" \
            --set-secrets="DATABASE_URL=db-connection-string:latest" \
            --set-env-vars="NODE_ENV=production" \
            --command="prisma" \
            --args="db,push,--accept-data-loss,--skip-generate,--schema=./prisma/schema.prisma"

      - name: Sync database schema
        run: |
          echo "Syncing database schema with Prisma..."
          gcloud run jobs execute prisma-migrate \
            --region=${{ env.REGION }} \
            --wait
