# Triggered on push to `main` (news/** or cloudbuild/news.yaml changed).
# Builds news.subfrost.io, pushes to Artifact Registry. Mirrors the
# subfrost-admin cloudbuild pattern (admin-web.yaml).
#
# Tagging strategy (3 tags per build):
#   - <SHORT_SHA>                  stable, audit-friendly
#   - <ISO_TIMESTAMP>-<SHORT_SHA>  sortable; what Flux ImagePolicy selects
#   - latest                       convenience for manual / quick deploys
#
# Deploy today is manual (`kubectl set image` / rollout). Once Flux image
# automation is wired for subfrost-news, the timestamp tag drives auto-rollout.

substitutions:
  _REGION: us-central1
  _AR_PROJECT: night-wolves-jogging
  _AR_REPO: subfrost-docker
  _IMAGE_PATH: subfrost-news

options:
  logging: CLOUD_LOGGING_ONLY
  # Next.js + pnpm build is memory-hungry; E2_HIGHCPU_8 (8 vCPU / 8GB) gives
  # more headroom than E2_MEDIUM. (Valid Cloud Build machine types only.)
  machineType: E2_HIGHCPU_8

steps:
  - id: compute-tag
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        TS=$$(date -u +'%Y%m%d%H%M%S')
        echo "$${TS}-${SHORT_SHA}" > /workspace/.image-tag
        echo "computed tag: $$(cat /workspace/.image-tag)"

  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        TS_TAG=$$(cat /workspace/.image-tag)
        IMG=${_REGION}-docker.pkg.dev/${_AR_PROJECT}/${_AR_REPO}/${_IMAGE_PATH}
        docker build -t $${IMG}:${SHORT_SHA} -t $${IMG}:$${TS_TAG} -t $${IMG}:latest news

  - id: push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        TS_TAG=$$(cat /workspace/.image-tag)
        IMG=${_REGION}-docker.pkg.dev/${_AR_PROJECT}/${_AR_REPO}/${_IMAGE_PATH}
        docker push $${IMG}:${SHORT_SHA}
        docker push $${IMG}:$${TS_TAG}
        docker push $${IMG}:latest
