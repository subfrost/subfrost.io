<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>SUBFROST Onramp</title>
  <!--
    Embedded Stripe Crypto Onramp host page.

    Loaded inside the SUBFROST mobile app's WKWebView (NOT a public
    entry point). The native app injects the onramp session's
    client_secret via window.mountOnramp(clientSecret) once the page
    finishes loading, and receives status updates back through the
    webkit.messageHandlers.onrampStatus bridge.

    This page must be served from subfrost.io, which is registered as an
    allowed onramp domain in Stripe (payment-method-domain
    pmd_1TuN7JQi88qpFRJ2wAcefrCf) so the widget's origin check passes.
  -->
  <!-- StripeJS must load alongside the crypto-onramp script or
       StripeOnramp() throws ("Please include StripeJS alongside…"). -->
  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://crypto-js.stripe.com/crypto-onramp-outer.js"></script>
  <style>
    :root { color-scheme: dark; }
    /* Match the app's Glacial dark palette (Theme.swift): canvasDeep
       #000000, textPrimary #F2F6FA. */
    html, body { margin: 0; padding: 0; background: #000000; color: #f2f6fa;
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif; }
    #onramp-element { min-height: 100vh; }
    #status { padding: 20px 16px; text-align: center; color: #8a9099; font-size: 14px; }
  </style>
</head>
<body>
  <div id="onramp-element"></div>
  <div id="status">Loading secure checkout…</div>
  <script>
    // Publishable key for the SUBFROST onramp Stripe account. Public by
    // design (pk_...). It MUST belong to the same Stripe account that
    // mints the onramp session on mobile-api, or createSession rejects.
    // The native app may also override it via mountOnramp's 2nd arg.
    var PUBLISHABLE_KEY = "pk_live_51SWgu3Qi88qpFRJ22QYF7iEbnfnnqphpy5yBzuR8oJ3fq4EhcIw28D85VEQrNsB35LWEKULxvQ0uu10CmrTaQv0W00kYUniPW0";

    function postStatus(status, sessionId) {
      // iOS: WKScriptMessageHandler bridge.
      try {
        var h = window.webkit
          && window.webkit.messageHandlers
          && window.webkit.messageHandlers.onrampStatus;
        if (h) h.postMessage({ status: status, sessionId: sessionId || "" });
      } catch (e) { /* not the iOS WebView; ignore */ }
      // Android: addJavascriptInterface bridge (takes a JSON string).
      try {
        if (window.SubfrostOnramp && window.SubfrostOnramp.postStatus) {
          window.SubfrostOnramp.postStatus(
            JSON.stringify({ status: status, sessionId: sessionId || "" }));
        }
      } catch (e) { /* not the Android WebView; ignore */ }
    }

    // Invoked by the native app once the WebView finishes loading, with
    // the client_secret from the freshly minted onramp session.
    window.mountOnramp = function (clientSecret, pkOverride) {
      var statusEl = document.getElementById("status");
      if (typeof StripeOnramp !== "function") {
        statusEl.textContent = "Onramp unavailable";
        postStatus("error", "");
        return;
      }
      try {
        var stripeOnramp = StripeOnramp(pkOverride || PUBLISHABLE_KEY);
        var session = stripeOnramp.createSession({
          clientSecret: clientSecret,
          // Mirror the app's Glacial dark theme (ios .../UI/Theme.swift):
          // pure-black canvas, frost-white primary CTA (the app's buttons
          // are frostBright #E9F0F7 with dark text), 12px radii.
          appearance: {
            theme: "dark",
            variables: {
              colorPrimary: "#E9F0F7",
              colorBackground: "#000000",
              borderRadius: "12px",
              fontFamily: "-apple-system, system-ui, 'Segoe UI', sans-serif",
            },
          },
        });
        session
          .addEventListener("onramp_ui_loaded", function () {
            statusEl.style.display = "none";
          })
          .addEventListener("onramp_session_updated", function (e) {
            var s = e.payload.session;
            if (s.status === "fulfillment_complete") {
              postStatus("fulfilled", s.id);
            } else if (s.status === "rejected") {
              postStatus("rejected", s.id);
            }
          })
          .mount("#onramp-element");
        postStatus("mounted", "");
      } catch (err) {
        statusEl.textContent = "Onramp failed to load";
        postStatus("error", "");
      }
    };
  </script>
</body>
</html>
