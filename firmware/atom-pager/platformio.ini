; SUBFROST hardware pager — M5Stack Atom Echo S3R, built-in speaker, no
; external parts. One generic binary for all devices; per-person credentials
; are entered in the on-device Wi-Fi setup portal (see README.md).
;
; Our units are the ESP32-S3 "EchoS3R" (USB id 303a:8000). Generic S3 board
; def on purpose: the M5 atoms3 def hard-codes a different Atom variant.
; M5Atomic-EchoBase is used purely as an ES8311 codec driver with the
; EchoS3R's own pins passed to init().

[env:atom-echo-s3r]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.4
    m5stack/M5Atomic-EchoBase@^1.0.2
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
