; SUBFROST hardware pager — M5Stack Atom Echo + Grove passive buzzer unit.
; One generic binary for all devices; per-person credentials are entered in
; the on-device Wi-Fi setup portal (see README.md).

[env:m5stack-atom]
platform = espressif32@6.7.0
board = m5stack-atom
framework = arduino
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.4
    fastled/FastLED@^3.6.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
