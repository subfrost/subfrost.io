; SUBFROST hardware pager — M5Stack Atom Echo S3R + Grove passive buzzer unit.
; One generic binary for all devices; per-person credentials are entered in
; the on-device Wi-Fi setup portal (see README.md).
;
; Our units are the ESP32-S3 "EchoS3R" (USB id 303a:8000; button G41, Grove
; G1/G2, no RGB LED). The env below targets that. For an original ESP32 Atom
; Echo, build with board = m5stack-atom and PIN_BUTTON 39 / PIN_BUZZER 26.

[env:atom-echo-s3r]
platform = espressif32@6.7.0
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
