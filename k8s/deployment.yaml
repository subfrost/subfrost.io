# subfrost.io — the single Next.js app image serves the public site, /admin CMS,
# and /api (incl. the internal-api.subfrost.io host, routed by the Ingress).
# media-server / meet-api are intentionally NOT deployed (dropped per flex).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subfrost-io
  namespace: subfrost
  labels:
    app: subfrost-io
spec:
  replicas: 2
  selector:
    matchLabels:
      app: subfrost-io
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Temporary in-place roll: the spot pool is request-saturated and at its max
      # node count, so a surge pod (maxSurge:1) can't schedule. maxUnavailable:1 +
      # maxSurge:0 retires an old pod first to free capacity for the new one.
      # Revert to maxUnavailable:0 / maxSurge:1 once capacity allows.
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: subfrost-io
    spec:
      serviceAccountName: subfrost-io
      # Schedule onto the cheap spot node pool. Spot nodes carry this taint; the
      # toleration + nodeSelector pin the workload there.
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      # Spread replicas across nodes so a single spot preemption can't take all.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: subfrost-io
      initContainers:
        # Cloud SQL Auth Proxy as a NATIVE sidecar (restartPolicy: Always, needs
        # GKE >= 1.28). Comes up before the migrate init step and stays running
        # for the app. subfrost-postgres has a public IP; the proxy tunnels over
        # IAM (cloudsql.client), so no authorized-networks / VPC peering needed.
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
          restartPolicy: Always
          args:
            - "--port=5432"
            - "night-wolves-jogging:us-central1:subfrost-postgres"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
        # One-shot schema sync before the app serves traffic. Uses the same app
        # image (the runner ships the Prisma CLI + schema). Connects via proxy.
        - name: migrate
          image: us-central1-docker.pkg.dev/night-wolves-jogging/subfrost-docker/subfrost-io
          command: ["prisma", "db", "push", "--skip-generate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: app
          image: us-central1-docker.pkg.dev/night-wolves-jogging/subfrost-docker/subfrost-io
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: CMS_BUCKET
              value: "subfrost-cms"
            # TLS-fingerprint telemetry sink. The /api/fp beacon (app/api/fp/route.ts)
            # fire-and-forgets per-request JA4/JA3 access events here, into today's
            # subfrost-cdn-<date> index. This is the new in-cluster ES in the
            # `telemetry` namespace (security disabled, cross-namespace ClusterIP
            # DNS); it replaces the old fp-server→rabbitmq→sink capture path. The
            # value below is also the route's default, so this is belt-and-braces.
            - name: TELEMETRY_ES_URL
              value: "http://elasticsearch.telemetry.svc.cluster.local:9200"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: AUTH_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: DATABASE_URL
            - name: ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: ADMIN_SECRET
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: RESEND_API_KEY
                  optional: true
            # Live Stripe path (SP-1). optional:true so a not-yet-synced secret
            # can't block pod startup — absent key => console runs in demo mode.
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: STRIPE_SECRET_KEY
                  optional: true
            # SP-4 webhook signing secret. optional:true mirrors STRIPE_SECRET_KEY —
            # an unsynced secret can't block startup; absent => receiver 400s deliveries.
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            # Static key gating GET /api/fuel. optional:true mirrors the STRIPE_*
            # entries — an unsynced secret can't block startup; absent => 503.
            - name: FUEL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: FUEL_API_KEY
                  optional: true
            # IPROYAL residential HTTP proxy for the treasury BSC-RPC path. When
            # set, lib/financials/treasury/source/bsc-rpc.ts tunnels the tlsfetch
            # TCP leg through it (HTTP CONNECT) so NodeReal sees a clean IP
            # instead of the Cloudflare-blocked datacenter NAT (which hangs).
            # NOTE: sourced from the PLAIN, committed Secret k8s/iproyal-proxy-
            # secret.yaml (NOT the ESO-managed subfrost-io-secrets) — pending
            # migration to external-secrets.yaml + gcloud Secret Manager.
            # optional:true — absent => bsc-rpc.ts dials direct (dev/local).
            - name: IPROYAL_PROXY
              valueFrom:
                secretKeyRef:
                  name: iproyal-proxy
                  key: IPROYAL_PROXY
                  optional: true
            # GoldRush (Covalent) key for Financials > Treasury BSC balances.
            # optional:true — absent => the page shows "not configured".
            - name: GOLDRUSH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: GOLDRUSH_API_KEY
                  optional: true
            # Documenso (e-sign document sender). Reuses the existing,
            # already-working self-hosted instance at https://sign.subfrost.io
            # via the secrets subfrost-admin created. Until present, the
            # document sender runs in local mock mode (no real sends).
            - name: DOCUMENSO_API_URL
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: DOCUMENSO_API_URL
                  optional: true
            - name: DOCUMENSO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: DOCUMENSO_API_KEY
                  optional: true
            - name: DOCUMENSO_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: DOCUMENSO_WEBHOOK_SECRET
                  optional: true
            # GitHub Issues integration (board intake + PR/issue sync). optional:true
            # so the pod starts without them; absent PAT => sync disabled, intake
            # accept/deny still works. Webhook receiver at /api/webhooks/github.
            - name: GITHUB_PAT
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: GITHUB_PAT
                  optional: true
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: subfrost-io-secrets
                  key: GITHUB_WEBHOOK_SECRET
                  optional: true
            # Anthropic Claude key for article translation (lib/cms/translate.ts:
            # the editor's "Translate with Claude" button). Lives in a STANDALONE
            # k8s Secret `anthropic-api-key` (created out-of-band, NOT the
            # ESO-managed subfrost-io-secrets) so it never rides the atomic
            # ExternalSecret sync. optional:true — absent => translationUnavailable()
            # keeps the button disabled instead of blocking pod startup.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-api-key
                  key: ANTHROPIC_API_KEY
                  optional: true
            # Team pager (ntfy in-cluster; console at /admin/pager). The publish
            # token lives in a STANDALONE Secret `ntfy-publish-token` (created
            # out-of-band after minting it on the ntfy server — see
            # k8s/ntfy/README.md), same pattern as anthropic-api-key.
            # optional:true — absent => /admin/pager shows "not configured".
            - name: NTFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ntfy-publish-token
                  key: NTFY_TOKEN
                  optional: true
            # Admin-role ntfy token: powers roster management (create/remove
            # teammates + mint device tokens) from /admin/pager. Same standalone
            # secret; absent => the console is send-only.
            - name: NTFY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ntfy-publish-token
                  key: NTFY_ADMIN_TOKEN
                  optional: true
            - name: CMS_BASE_URL
              value: "https://subfrost.io"
            - name: EMAIL_FROM
              value: "SUBFROST <noreply@mail.subfrost.io>"
            # Optional: JSON-RPC endpoint of the dedicated frBTC volume metashrew
            # indexer (its own rockshrew-mono instance). When set AND reachable,
            # Financials > Revenue reads the BTC wrap/unwrap fee series on-chain
            # via metashrew_view (frbtc_volume_range / frbtc_volume_tip); when
            # unset it falls back to the WrapTransaction/UnwrapTransaction tables.
            # The indexer runs in the subvh cluster (revolut), so this is the
            # public free-tier route (no API key) through its tlsd ingress. The
            # client strips /frbtc to read frBTC /totalsupply for the reserve
            # collateralization reconciliation.
            - name: FRBTC_INDEXER_RPC_URL
              value: "https://mainnet.l.subfrost.io/v4/jsonrpc/frbtc"
          # readiness uses /api/health (checks the DB) so a pod with no DB is
          # pulled from the LB; liveness is a plain TCP check so a DB blip does
          # NOT trigger pod restarts.
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
