# GKE (GCE) Ingress fronting the app — PUBLIC host only: subfrost.io
# (serves the site + /admin + /api). Google-managed TLS.
#
# internal-api.subfrost.io is INTENTIONALLY NOT here: per flex it's internal —
# Next.js queries it in-cluster, so it needs no public DNS/Ingress. It's reached
# via the ClusterIP Service DNS (subfrost-io.subfrost.svc.cluster.local) or the
# app's own loopback. CLI/automation hits the PUBLIC Next.js routes
# (subfrost.io/api/... with an API key) instead of internal-api.
#
# Safe to apply before DNS cutover: the managed cert stays "Provisioning" until
# subfrost.io's A record points at the static IP, so current serving is untouched
# until you flip DNS.
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: subfrost-io-cert
  namespace: subfrost
spec:
  domains:
    - subfrost.io
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: subfrost-io-fc
  namespace: subfrost
spec:
  redirectToHttps:
    enabled: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: subfrost-io
  namespace: subfrost
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "subfrost-io-ip" # gcloud compute addresses create ... --global
    networking.gke.io/managed-certificates: "subfrost-io-cert"
    networking.gke.io/v1beta1.FrontendConfig: "subfrost-io-fc"
spec:
  rules:
    - host: subfrost.io
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: subfrost-io
                port:
                  number: 80
