# IPROYAL residential HTTP proxy credentials for the treasury BSC-RPC path.
#
# The treasury snapshot fetches BSC balances via tlsfetch → NodeReal
# (bsc-mainnet.nodereal.io, behind Cloudflare). From the GKE pod the datacenter
# NAT egress IP is Cloudflare-blocked, so a direct dial hangs. bsc-rpc.ts routes
# the TCP leg through this residential proxy (HTTP CONNECT) when IPROYAL_PROXY is
# set, giving a clean IP; a hard 20s timeout guarantees graceful failure.
#
# This is a PLAIN k8s Secret (committed for Flux), NOT ESO-managed like
# subfrost-io-secrets — the value is a rotating IPROYAL session credential.
# TODO: migrate to GCP Secret Manager + external-secrets.yaml once a stable/
# long-lived proxy credential is provisioned (mirror the other secretKeyRefs).
apiVersion: v1
kind: Secret
metadata:
  name: iproyal-proxy
  namespace: subfrost
type: Opaque
stringData:
  IPROYAL_PROXY: "http://5OmdOfkSu5kcDOHa:dbcot5IaQHzcZbYy_country-us_session-ghostmaker_lifetime-30m@geo.iproyal.com:12321"
