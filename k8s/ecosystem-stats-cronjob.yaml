# Hourly ecosystem profile stats: generic per-contract token data + per-project
# adapters (Arbuzino jackpot). Endpoint is cheap and idempotent-ish (one
# snapshot per run); retries safe.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecosystem-stats-sync
  namespace: subfrost
spec:
  schedule: "17 * * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # The endpoint is idempotent per UTC day, so retries are safe.
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          nodeSelector:
            cloud.google.com/gke-spot: "true"
          tolerations:
            - key: cloud.google.com/gke-spot
              operator: Equal
              value: "true"
              effect: NoSchedule
          containers:
            - name: tick
              image: curlimages/curl:8.11.1
              command:
                - sh
                - -c
                # In-cluster service DNS — no public round-trip, works even if
                # the ingress is having a bad day. The CronJob only *sends* the
                # Bearer header once PREFETCH_SECRET is synced into the k8s Secret;
                # for the server to actually *enforce* it, PREFETCH_SECRET must
                # ALSO be added to external-secrets.yaml AND wired into the app
                # container env in deployment.yaml (route.ts reads process.env).
                # Until both are done the endpoint stays open, same convention as
                # /api/prefetch.
                - |
                  URL=http://subfrost-io.subfrost.svc.cluster.local/api/ecosystem/stats-cron
                  # --fail-with-body (curl ≥7.76): still exits non-zero on 5xx so
                  # the Job retries, but prints the {ok:false,error:…} body first so
                  # a failed capture is diagnosable from the pod log (plain -f eats it).
                  if [ -n "${PREFETCH_SECRET:-}" ]; then
                    curl -sS --fail-with-body --max-time 540 -H "Authorization: Bearer $PREFETCH_SECRET" "$URL"
                  else
                    curl -sS --fail-with-body --max-time 540 "$URL"
                  fi
              env:
                - name: PREFETCH_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: subfrost-io-secrets
                      key: PREFETCH_SECRET
                      optional: true
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
