apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: subfrost

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - external-secrets.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pdb.yaml

# Rewrites every `REPLACE_IMAGE` (app + migrate initContainer) to the real
# Artifact Registry image. Override newTag per release (or use the SHORT_SHA the
# Cloud Build trigger produces).
images:
  - name: REPLACE_IMAGE
    newName: us-central1-docker.pkg.dev/REPLACE_PROJECT_ID/subfrost-docker/subfrost-io
    newTag: latest
