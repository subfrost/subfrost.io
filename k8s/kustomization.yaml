apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: subfrost

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - external-secrets.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pdb.yaml

# Pins the image tag (override per release, or use the SHORT_SHA the Cloud Build
# trigger produces).
images:
  - name: us-central1-docker.pkg.dev/night-wolves-jogging/subfrost-docker/subfrost-io
    newTag: latest
