# TEMPLATE — do not commit real values. The live Secrets are created out-of-band
# with kubectl (see k8s/news/README.md). This documents the expected keys.
#
# news-secrets: app runtime config
apiVersion: v1
kind: Secret
metadata:
  name: news-secrets
  namespace: news
type: Opaque
stringData:
  # App connects to Postgres through the Cloud SQL Auth Proxy sidecar on localhost.
  DATABASE_URL: "postgresql://news:CHANGE_ME@127.0.0.1:5432/news?schema=public&sslmode=disable"
  # Auth.js — openssl rand -hex 32
  AUTH_SECRET: "CHANGE_ME"
  AUTH_URL: "https://news.subfrost.io"
  NEXTAUTH_URL: "https://news.subfrost.io"
---
# cloudsql-sa: GCP service-account key JSON used by the Cloud SQL Auth Proxy.
# Create from a least-privilege SA holding roles/cloudsql.client.
apiVersion: v1
kind: Secret
metadata:
  name: cloudsql-sa
  namespace: news
type: Opaque
stringData:
  key.json: |
    { "type": "service_account", "...": "CHANGE_ME" }
