apiVersion: batch/v1
kind: CronJob
metadata:
  name: opreturn-sync
  namespace: subfrost
spec:
  schedule: "30 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: subfrost-io
          restartPolicy: Never
          nodeSelector:
            cloud.google.com/gke-spot: "true"
          tolerations:
            - key: cloud.google.com/gke-spot
              operator: Equal
              value: "true"
              effect: NoSchedule
          initContainers:
            - name: cloud-sql-proxy
              image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.13.0
              restartPolicy: Always
              args:
                - "--port=5432"
                - "night-wolves-jogging:us-central1:subfrost-postgres"
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 128Mi
          containers:
            - name: sync
              image: us-central1-docker.pkg.dev/night-wolves-jogging/subfrost-docker/subfrost-io
              command: ["node", "scripts/sync-opreturn.mjs"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: subfrost-io-secrets
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
