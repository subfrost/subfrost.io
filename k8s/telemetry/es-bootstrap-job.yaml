# SCAFFOLD — one-shot Job that applies the ILM policies + index templates
# (from the es-index-templates ConfigMap) to Elasticsearch. This replaces
# Step 1 of cdn-telemetry-sink/deploy.sh (the curl PUTs). Idempotent — safe
# to re-run; ES treats template/ILM PUTs as upserts.
#
# Ordering: run this AFTER svc/elasticsearch is Ready and BEFORE the
# re-index Job and the sink Deployment, so daily indices created by the
# bulk load / first traffic pick up the strict mapping + 30d ILM.
# Flux: set a dependsOn (es Kustomization) or a healthcheck gate.
apiVersion: batch/v1
kind: Job
metadata:
  name: es-bootstrap
  namespace: telemetry
  labels:
    app.kubernetes.io/component: es-bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: es-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apply-templates
          image: curlimages/curl:8.8.0
          env:
            # In-cluster ES; xpack.security disabled in the scaffold so no
            # creds. If security is enabled later, pull ELASTICSEARCH_URL
            # (with auth) from ESO instead — see external-secrets.yaml.
            - name: ES_URL
              value: "http://elasticsearch.telemetry.svc.cluster.local:9200"
          command:
            - sh
            - -c
            - |
              set -eu
              echo "waiting for ES..."
              until curl -fsS "$ES_URL/_cluster/health?wait_for_status=yellow&timeout=5s" >/dev/null; do
                sleep 3
              done
              echo "applying ILM policies + index templates..."
              curl -fsS -X PUT "$ES_URL/_ilm/policy/subfrost-cdn-delete-30d" \
                -H 'Content-Type: application/json' \
                --data-binary @/templates/ilm-policy.json
              curl -fsS -X PUT "$ES_URL/_ilm/policy/subfrost-diagnostics-delete-30d" \
                -H 'Content-Type: application/json' \
                --data-binary @/templates/ilm-policy-diagnostics.json
              curl -fsS -X PUT "$ES_URL/_index_template/subfrost-cdn" \
                -H 'Content-Type: application/json' \
                --data-binary @/templates/es-template.json
              curl -fsS -X PUT "$ES_URL/_index_template/subfrost-diagnostics" \
                -H 'Content-Type: application/json' \
                --data-binary @/templates/es-template-diagnostics.json
              echo "bootstrap OK"
          volumeMounts:
            - { name: templates, mountPath: /templates, readOnly: true }
      volumes:
        - name: templates
          configMap:
            name: es-index-templates
