# SCAFFOLD — ESO wiring for the telemetry namespace, mirroring the pattern
# in k8s/external-secrets.yaml (subfrost ns). Pulls RabbitMQ credentials
# from GCP Secret Manager into a k8s Secret `telemetry-secrets`.
#
# TODO: create the Secret Manager entries before applying:
#   gcloud secrets create telemetry-rabbitmq-password --project night-wolves-jogging --data-file=-
#   gcloud secrets create telemetry-rabbitmq-url --project night-wolves-jogging --data-file=-
#     (url form: amqp://telemetry:<password>@rabbitmq.telemetry.svc.cluster.local:5672/)
#
# If xpack.security is enabled on ES later, add an ELASTICSEARCH_URL secret
# here too and switch the sink/bootstrap/reindex env from the plaintext
# in-cluster URL to this secret.
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: telemetry
spec:
  provider:
    gcpsm:
      projectID: "night-wolves-jogging"
      auth:
        workloadIdentity:
          clusterLocation: "us-central1-a"
          clusterName: "subfrost-io"
          serviceAccountRef:
            name: telemetry-reindex
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: telemetry-secrets
  namespace: telemetry
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: telemetry-secrets
    creationPolicy: Owner
  data:
    - secretKey: rabbitmq_password
      remoteRef:
        key: telemetry-rabbitmq-password
    - secretKey: rabbitmq_url
      remoteRef:
        key: telemetry-rabbitmq-url
