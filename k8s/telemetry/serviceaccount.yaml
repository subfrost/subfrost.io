# KSA bound (via Workload Identity) to GSA subfrost-io-k8s with read+WRITE on
# gs://subfrost-docs: the re-index Job reads the dump tarball, and the
# es-snapshot CronJob WRITES the daily DR exports. The ES pod itself does not
# need GCS and runs with the default KSA. (Verified live 2026-06-30: the GSA
# already has write — a snapshot landed at gs://subfrost-docs/es-snapshots/.)
#
# Provisioned out-of-band (kept for reference / re-creation):
#   gcloud iam service-accounts create telemetry-reindex \
#     --project night-wolves-jogging
#   # objectAdmin (not objectViewer) — the snapshot export needs object create:
#   gcloud storage buckets add-iam-policy-binding gs://subfrost-docs \
#     --member "serviceAccount:subfrost-io-k8s@night-wolves-jogging.iam.gserviceaccount.com" \
#     --role roles/storage.objectAdmin
#   gcloud iam service-accounts add-iam-policy-binding \
#     subfrost-io-k8s@night-wolves-jogging.iam.gserviceaccount.com \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:night-wolves-jogging.svc.id.goog[telemetry/telemetry-reindex]"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telemetry-reindex
  namespace: telemetry
  annotations:
    iam.gke.io/gcp-service-account: subfrost-io-k8s@night-wolves-jogging.iam.gserviceaccount.com
