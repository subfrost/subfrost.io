# ntfy — self-hosted pub-sub pager backend (page.subfrost.io).
# Single replica: state is a ReadWriteOnce PD and ntfy has no HA story;
# subscribers (phones/ESP32 pagers) reconnect automatically, and the message
# cache redelivers anything published while a spot preemption rescheduled the
# pod. Recreate strategy so the replacement pod can claim the RWO volume.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: subfrost
  labels:
    app: ntfy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:v2.14.0
          args: ["serve"]
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy
              readOnly: true
            - name: data
              mountPath: /var/lib/ntfy
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: ntfy-config
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
