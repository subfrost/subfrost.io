apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: subfrost
  annotations:
    cloud.google.com/backend-config: '{"default":"ntfy"}'
spec:
  type: ClusterIP
  selector:
    app: ntfy
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# Pager subscriptions are long-lived streams (JSON stream / WebSocket), so the
# GCE LB backend timeout must be far above the 30s default or every subscriber
# gets cut and reconnects constantly. Clients still reconnect gracefully when
# the 1h cap hits.
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: ntfy
  namespace: subfrost
spec:
  healthCheck:
    type: HTTP
    requestPath: /v1/health
    port: 80
  timeoutSec: 3600
