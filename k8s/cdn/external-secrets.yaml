# Pulls the /secure HMAC key from GCP Secret Manager into a k8s Secret via
# the External Secrets Operator. Reuses the same SecretStore pattern as the
# main app (k8s/external-secrets.yaml), but a SEPARATE ExternalSecret so a
# CDN key rotation never touches the app's atomic secret sync.
#
# Create the upstream secret once (the value is the shared HMAC key the
# subfrost.io app signs /secure tokens with — keep them in sync):
#   head -c 32 /dev/urandom | base64 | \
#     gcloud secrets create subfrost-cdn-secure-hmac-key \
#       --project night-wolves-jogging --data-file=-
# Then set the SAME value as SECURE_HMAC_KEY in the subfrost.io app so it can
# mint matching tokens (e.g. a `cms-secure-hmac-key` secret / app env).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager-cdn
  namespace: subfrost
spec:
  provider:
    gcpsm:
      projectID: "night-wolves-jogging"
      auth:
        workloadIdentity:
          clusterLocation: "us-central1-a"
          clusterName: "subfrost-io"
          serviceAccountRef:
            name: subfrost-cdn
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: subfrost-cdn-secrets
  namespace: subfrost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager-cdn
    kind: SecretStore
  target:
    name: subfrost-cdn-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECURE_HMAC_KEY
      remoteRef:
        key: subfrost-cdn-secure-hmac-key
