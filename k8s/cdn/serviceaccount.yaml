# Kubernetes SA for subfrost-cdn, bound via Workload Identity to a Google
# SA that can READ the two GCS buckets the CDN serves. The CDN fetches a
# GKE metadata-server access token at runtime (no SA key material in the
# container) and uses it as `Authorization: Bearer` against the GCS JSON API.
#
# The Google SA needs ONLY object-read on the two buckets:
#   roles/storage.objectViewer  on bucket alkane-assets-bucket
#   roles/storage.objectViewer  on bucket subfrost-cdn-bucket
#   roles/secretmanager.secretAccessor on secret subfrost-cdn-secure-hmac-key
#     (so External Secrets can pull SECURE_HMAC_KEY)
#
# One-time bindings (DO NOT run from CI — operator runs these once):
#
#   GSA=subfrost-cdn@night-wolves-jogging.iam.gserviceaccount.com
#   gcloud iam service-accounts create subfrost-cdn \
#     --project night-wolves-jogging \
#     --display-name "subfrost-cdn GCS reader"
#
#   # objectViewer on each bucket (bucket-scoped, least privilege)
#   gsutil iam ch serviceAccount:$GSA:roles/storage.objectViewer gs://alkane-assets-bucket
#   gsutil iam ch serviceAccount:$GSA:roles/storage.objectViewer gs://subfrost-cdn-bucket
#
#   # Workload Identity: let the KSA subfrost/subfrost-cdn impersonate the GSA
#   gcloud iam service-accounts add-iam-policy-binding $GSA \
#     --project night-wolves-jogging \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:night-wolves-jogging.svc.id.goog[subfrost/subfrost-cdn]"
#
#   # secret accessor for the /secure HMAC key (see external-secrets.yaml)
#   gcloud secrets add-iam-policy-binding subfrost-cdn-secure-hmac-key \
#     --project night-wolves-jogging \
#     --role roles/secretmanager.secretAccessor \
#     --member "serviceAccount:$GSA"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: subfrost-cdn
  namespace: subfrost
  annotations:
    iam.gke.io/gcp-service-account: "subfrost-cdn@night-wolves-jogging.iam.gserviceaccount.com"
