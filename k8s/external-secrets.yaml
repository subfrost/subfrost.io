# Pulls runtime secrets from GCP Secret Manager into a k8s Secret using the
# External Secrets Operator (https://external-secrets.io). Install the operator
# first, or skip this file and create the Secret by hand (see k8s/README.md).
#
# NOTE: DATABASE_URL must point at the Cloud SQL Auth Proxy sidecar, i.e. host
# 127.0.0.1:5432. If the existing `db-connection-string` secret embeds the
# private IP instead, store a k8s-specific value (host 127.0.0.1) — see README.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: subfrost
spec:
  provider:
    gcpsm:
      projectID: "night-wolves-jogging"
      auth:
        workloadIdentity:
          clusterLocation: "us-central1-a"
          clusterName: "subfrost-io"
          serviceAccountRef:
            name: subfrost-io
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: subfrost-io-secrets
  namespace: subfrost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: subfrost-io-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: cms-auth-secret # exists ✓
    - secretKey: DATABASE_URL
      remoteRef:
        # k8s-specific URL: host 127.0.0.1:5432 (the Cloud SQL Auth Proxy sidecar).
        # NOT db-connection-string — that one is a Cloud Run unix socket
        # (localhost/subfrost?host=/cloudsql/...), unusable in k8s.
        key: db-connection-string-k8s
    - secretKey: ADMIN_SECRET
      remoteRef:
        key: cms-admin-secret # seeded 2026-06-20 from the Cloud Run inline env
    # RESEND_API_KEY temporarily removed: the `resend-api-key` secret does NOT
    # exist in this project's Secret Manager (404), and ESO syncs `data` atomically
    # — one missing key failed the WHOLE ExternalSecret (Ready=False since
    # 2026-06-20), so AUTH-email AND every other key (incl. STRIPE) stopped syncing.
    # Re-add this entry once the real Resend key is created:
    #   gcloud secrets create resend-api-key --project night-wolves-jogging --data-file=-
    #   - secretKey: RESEND_API_KEY
    #     remoteRef: { key: resend-api-key }
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        # Live Stripe secret key for the billing console live path (SP-1).
        # Created 2026-06-21 in Secret Manager. Until present, the console stays in demo.
        key: stripe-secret-key
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        # SP-4 webhook signing secret (whsec_) for POST /api/webhooks/stripe.
        # Created 2026-06-22 in Secret Manager from the live Stripe endpoint
        # (we_1TlA5T…). Until present, the receiver 400s every delivery.
        key: stripe-webhook-secret
    - secretKey: FUEL_API_KEY
      remoteRef:
        # Static shared key gating GET /api/fuel — subfrost-app reads FUEL
        # allocations server-to-server. Created 2026-06-22 in Secret Manager.
        # Until present, /api/fuel returns 503 (FUEL_API_KEY not configured).
        key: fuel-api-key
    - secretKey: PAY_API_KEY
      remoteRef:
        # Shared key gating POST /api/v1/pay/usage — the mobile-api backend
        # ("subvh") POSTs SUBFROST Pay usage events server-to-server. Must
        # match the backend's PAY_API_KEY (subfrost-mobile-api-secrets key
        # pay_api_key). Until present in Secret Manager, the ingest returns
        # 503 (PAY_API_KEY not configured).
        key: pay-api-key
    - secretKey: GOLDRUSH_API_KEY
      remoteRef:
        # GoldRush (Covalent) API key for the Financials > Treasury BSC balances.
        # Created 2026-06-22 in Secret Manager. Until present, the page degrades
        # to "not configured".
        key: goldrush-api-key
    # Documenso (e-sign / /admin/documents). Reuses the EXISTING secrets that
    # subfrost-admin created for the live instance at https://sign.subfrost.io —
    # no new keys needed. ESO syncs `data` atomically, so these three must exist
    # (verified present 2026-06-23). Until synced, the sender stays in mock mode.
    - secretKey: DOCUMENSO_API_URL
      remoteRef:
        key: subfrost-admin-documenso-api-url
    - secretKey: DOCUMENSO_API_KEY
      remoteRef:
        key: subfrost-admin-documenso-api-key
    - secretKey: DOCUMENSO_WEBHOOK_SECRET
      remoteRef:
        key: subfrost-admin-documenso-webhook-secret
    # GitHub Issues integration. The PAT already exists in Secret Manager as
    # `subfrost-admin-github-pat` (reused — must have repo+issues scope across
    # subfrost-app/subfrost/subfrost.io). The webhook secret is the shared secret
    # configured on each repo's webhook; create it as `github-webhook-secret`
    # before deploy (ESO syncs `data` atomically, so all referenced keys must
    # exist). Until present, intake accept/deny works locally but sync is off.
    - secretKey: GITHUB_PAT
      remoteRef:
        key: subfrost-admin-github-pat
    - secretKey: GITHUB_WEBHOOK_SECRET
      remoteRef:
        key: github-webhook-secret
