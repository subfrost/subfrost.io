# Pulls runtime secrets from GCP Secret Manager into a k8s Secret using the
# External Secrets Operator (https://external-secrets.io). Install the operator
# first, or skip this file and create the Secret by hand (see k8s/README.md).
#
# NOTE: DATABASE_URL must point at the Cloud SQL Auth Proxy sidecar, i.e. host
# 127.0.0.1:5432. If the existing `db-connection-string` secret embeds the
# private IP instead, store a k8s-specific value (host 127.0.0.1) — see README.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: subfrost
spec:
  provider:
    gcpsm:
      projectID: "night-wolves-jogging"
      auth:
        workloadIdentity:
          clusterLocation: "us-central1-a"
          clusterName: "subfrost-io"
          serviceAccountRef:
            name: subfrost-io
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: subfrost-io-secrets
  namespace: subfrost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: subfrost-io-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: cms-auth-secret # exists ✓
    - secretKey: DATABASE_URL
      remoteRef:
        # k8s-specific URL: host 127.0.0.1:5432 (the Cloud SQL Auth Proxy sidecar).
        # NOT db-connection-string — that one is a Cloud Run unix socket
        # (localhost/subfrost?host=/cloudsql/...), unusable in k8s.
        key: db-connection-string-k8s
    - secretKey: ADMIN_SECRET
      remoteRef:
        key: cms-admin-secret # seeded 2026-06-20 from the Cloud Run inline env
    - secretKey: RESEND_API_KEY
      remoteRef:
        # Resend API key for invite / password-reset / verification emails.
        # Same key used by subfrost-mobile (re_KCgDhsne_…); mirror it into this
        # project's Secret Manager: gcloud secrets create resend-api-key \
        #   --project night-wolves-jogging --data-file=-
        key: resend-api-key
