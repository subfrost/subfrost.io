# Pulls runtime secrets from GCP Secret Manager into a k8s Secret using the
# External Secrets Operator (https://external-secrets.io). Install the operator
# first, or skip this file and create the Secret by hand (see k8s/README.md).
#
# NOTE: DATABASE_URL must point at the Cloud SQL Auth Proxy sidecar, i.e. host
# 127.0.0.1:5432. If the existing `db-connection-string` secret embeds the
# private IP instead, store a k8s-specific value (host 127.0.0.1) — see README.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: subfrost
spec:
  provider:
    gcpsm:
      projectID: "REPLACE_PROJECT_ID"
      auth:
        workloadIdentity:
          clusterLocation: "REPLACE_CLUSTER_LOCATION" # e.g. us-central1
          clusterName: "REPLACE_CLUSTER_NAME"
          serviceAccountRef:
            name: subfrost-io
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: subfrost-io-secrets
  namespace: subfrost
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: subfrost-io-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: cms-auth-secret # exists ✓
    - secretKey: DATABASE_URL
      remoteRef:
        key: db-connection-string # exists ✓ — but must resolve to host 127.0.0.1:5432 (proxy)
    - secretKey: ADMIN_SECRET
      # NOTE: there is NO ADMIN_SECRET in Secret Manager yet — today it's an inline
      # env on Cloud Run. Create one (suggest `cms-admin-secret`) with that value,
      # then set the key here. (Probed 2026-06-19: only cms-auth-secret,
      # db-connection-string, db-password exist for the app.)
      remoteRef:
        key: REPLACE_ADMIN_SECRET_NAME
