# Kubernetes SA bound to a Google SA via Workload Identity. The Google SA needs:
#   roles/storage.objectAdmin   on bucket subfrost-cms   (CMS uploads)
#   roles/cloudsql.client        on the project           (Cloud SQL Auth Proxy)
#   roles/secretmanager.secretAccessor on the secrets     (External Secrets)
# Binding (run once):
#   gcloud iam service-accounts add-iam-policy-binding subfrost-io-k8s@night-wolves-jogging.iam.gserviceaccount.com \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:night-wolves-jogging.svc.id.goog[subfrost/subfrost-io]"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: subfrost-io
  namespace: subfrost
  annotations:
    iam.gke.io/gcp-service-account: "subfrost-io-k8s@night-wolves-jogging.iam.gserviceaccount.com"
